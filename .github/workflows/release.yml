name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            build_script: build:win
            artifact_name: windows-bundles
            artifact_glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - name: macOS
            os: macos-latest
            build_script: build:mac
            artifact_name: macos-bundles
            artifact_glob: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - name: Linux
            os: ubuntu-22.04
            build_script: build:linux
            artifact_name: linux-bundles
            artifact_glob: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for macOS universal build
        if: matrix.platform.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run ${{ matrix.platform.build_script }}

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: release-assets/windows

      - name: Download macOS bundles
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles
          path: release-assets/macos

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: release-assets/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/**/*
            release-assets/macos/**/*
            release-assets/linux/**/*
